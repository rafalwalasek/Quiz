<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tests</title>

    <link rel="stylesheet" href="quiz.css">
</head>
<body>
    
    <main class="main">

        <header class="header">
            <div class="logo">
                <img src="images/w.ico" alt="W"><span>T</span>ests.
            </div>

            <nav class="navbar">
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Services</a>
                <a href="#" class="active">Tests</a>
                <a href="#">Contact</a>
            </nav>
        </header>

        <div class="container">
            <section class="quiz-section">
                <div class="quiz-box">
                    <h2>Sieci komputerowe</h2>
                    <div class="quiz-header">
                        <span>aaa</span>
                        <span class="header-score">Wynik: 0 / 5</span>
                    </div>

                    <h3 class="question-text">?</h3>

                    <div class="option-list">
                        <div class="option">
                            <span>A</span>
                        </div>
                        <div class="option">
                            <span>B</span>
                        </div>
                        <div class="option">
                            <span>C</span>
                        </div>
                        <div class="option">
                            <span>D</span>
                        </div>
                    </div>

                    <div class="quiz-footer">
                        <span class="question-total">1 z 20 Pytań</span>
                        <button class="previous-btn">Poprzednie</button>
                        <button class="next-btn">Następne</button>
                    </div>
                </div>
            </section>
        
            <section class="home">
                <div class="home-content">
                    <h2>Sieci</h2>
                    <p>Test składa się z 20 pytań. Aby zdać trzeba uzyskać 50% poprawnych odpowiedzi. Czas na wykonanie testu to 30 min. Powodzenia :)</p>
                    <button class="start-btn">Start</button>
                </div>
            </section>
        </div>

    </main>

    <script src="quiz.js"></script>

</body>
</html>
